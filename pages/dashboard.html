<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - AGILIZATE</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <div class="app-container">
    <nav class="navbar">
      <div class="navbar-brand">
        <h1>AGILIZATE</h1>
      </div>
      <div class="navbar-user">
        <span id="user-name"></span>
        <button id="logout-btn" class="btn btn-sm">Salir</button>
      </div>
    </nav>
    
    <div class="sidebar">
      <ul class="sidebar-menu">
        <li><a href="dashboard.html" class="active">Dashboard</a></li>
        <li><a href="solicitudes.html">Mis Solicitudes</a></li>
        <li><a href="crear-solicitud.html">Nueva Solicitud</a></li>
        <li><a href="aprobar.html">Aprobar</a></li>
        <li><a href="porteria.html">Portería</a></li>
      </ul>
    </div>
    
    <main class="main-content">
      <h2>Dashboard</h2>
      
      <div class="dashboard-cards">
        <div class="card">
          <h3>Solicitudes Totales</h3>
          <p class="metric" id="total-solicitudes">-</p>
        </div>
        <div class="card">
          <h3>Pendientes</h3>
          <p class="metric" id="total-pendientes">-</p>
        </div>
        <div class="card">
          <h3>Aprobadas</h3>
          <p class="metric" id="total-aprobadas">-</p>
        </div>
      </div>
      
      <div id="loading" class="loading" style="display:none;">Cargando...</div>
    </main>
  </div>
  
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script>
    async function loadDashboard() {
      document.getElementById('loading').style.display = 'block';
      const result = await API.getDashboard();
      document.getElementById('loading').style.display = 'none';
      
      if (result.ok) {
        document.getElementById('total-solicitudes').textContent = result.data.total || 0;
        document.getElementById('total-pendientes').textContent = result.data.pendientes || 0;
        document.getElementById('total-aprobadas').textContent = result.data.aprobadas || 0;
      }
    }
    
    if (Auth.isLoggedIn()) {
      loadDashboard();
    } else {
      window.location.href = '../index.html';
    }
  </script>
</body>
</html>
