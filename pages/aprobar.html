<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aprobar Solicitudes - AGILIZATE</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <div class="app-container">
    <nav class="navbar">
      <button class="menu-toggle" id="menu-toggle">
        <span></span><span></span><span></span>
      </button>
      <div class="navbar-brand"><h1>AGILIZATE</h1></div>
      <div class="navbar-user">
        <span id="user-name"></span>
        <button id="logout-btn" class="btn btn-sm btn-secondary">Salir</button>
      </div>
    </nav>
    
    <div class="sidebar" id="sidebar">
      <ul class="sidebar-menu">
        <li><a href="dashboard.html">📊 Dashboard</a></li>
        <li><a href="solicitudes.html">📝 Mis Solicitudes</a></li>
        <li><a href="crear-solicitud.html">➕ Nueva Solicitud</a></li>
        <li><a href="aprobar.html" class="active">✅ Aprobar</a></li>
        <li><a href="porteria.html">🚪 Portería</a></li>
        <li><a href="admin.html">⚙️ Administración</a></li>
      </ul>
    </div>
    
    <main class="main-content">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2>Aprobar Solicitudes</h2>
        <button class="btn btn-secondary btn-sm" onclick="loadPendientes()">🔄 Actualizar</button>
      </div>
      
      <div class="card" style="margin-bottom: 24px;">
        <h3>Filtros</h3>
        <div class="form-row col-3">
          <div class="form-group">
            <label>Desde</label>
            <input type="date" id="filtro-desde">
          </div>
          <div class="form-group">
            <label>Hasta</label>
            <input type="date" id="filtro-hasta">
          </div>
          <div class="form-group">
            <label>Estado</label>
            <select id="filtro-status">
              <option value="">Todos</option>
              <option value="PENDIENTE_APROBACION" selected>Pendientes</option>
              <option value="APROBADA">Aprobadas</option>
              <option value="RECHAZADA">Rechazadas</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="aplicarFiltros()">Aplicar Filtros</button>
      </div>
      
      <div id="loading" class="loading" style="display:none;">
        <div class="spinner"></div>
      </div>
      
      <div id="solicitudes-container"></div>
    </main>
  </div>
  
  <!-- Modal Aprobar -->
  <div id="modal-aprobar" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Aprobar Solicitud</h3>
        <button class="modal-close" onclick="cerrarModal('modal-aprobar')">×</button>
      </div>
      <div class="modal-body">
        <div id="detalle-solicitud"></div>
        <div class="form-group">
          <label>Observación</label>
          <textarea id="obs-aprobacion" rows="3" placeholder="Observación (opcional)"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="cerrarModal('modal-aprobar')">Cancelar</button>
        <button class="btn btn-success" onclick="confirmarAprobacion()">✅ Aprobar</button>
      </div>
    </div>
  </div>
  
  <!-- Modal Rechazar -->
  <div id="modal-rechazar" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Rechazar Solicitud</h3>
        <button class="modal-close" onclick="cerrarModal('modal-rechazar')">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="required">Motivo del Rechazo</label>
          <textarea id="motivo-rechazo" rows="4" placeholder="Ingrese el motivo del rechazo..." required></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="cerrarModal('modal-rechazar')">Cancelar</button>
        <button class="btn btn-danger" onclick="confirmarRechazo()">❌ Rechazar</button>
      </div>
    </div>
  </div>
  
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script>
    let solicitudesData = [];
    let solicitudActual = null;
    
    async function loadPendientes() {
      document.getElementById('loading').style.display = 'flex';
      
      const filtros = {
        status: document.getElementById('filtro-status').value || 'PENDIENTE_APROBACION',
        desde: document.getElementById('filtro-desde').value,
        hasta: document.getElementById('filtro-hasta').value
      };
      
      const result = await API.getSolicitudes(filtros);
      document.getElementById('loading').style.display = 'none';
      
      if (result.ok) {
        solicitudesData = result.data;
        mostrarSolicitudes(result.data);
      }
    }
    
    function mostrarSolicitudes(solicitudes) {
      const container = document.getElementById('solicitudes-container');
      
      if (solicitudes.length === 0) {
        container.innerHTML = '<div class="empty-state"><h3>No hay solicitudes pendientes</h3></div>';
        return;
      }
      
      // Agrupar por número de solicitud
      const grupos = {};
      solicitudes.forEach(sol => {
        if (!grupos[sol.NumeroSolicitud]) grupos[sol.NumeroSolicitud] = [];
        grupos[sol.NumeroSolicitud].push(sol);
      });
      
      let html = '';
      Object.entries(grupos).forEach(([num, sols]) => {
        const primera = sols[0];
        const totalHoras = sols.reduce((sum, s) => sum + parseFloat(s.CantidadHoras || 0), 0);
        const totalValor = sols.reduce((sum, s) => sum + parseFloat(s.TotalGeneral || 0), 0);
        
        html += `
          <div class="card" style="margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px;">
              <div>
                <h3 style="font-size: 18px; color: var(--primary); margin-bottom: 8px;">
                  Solicitud N° ${num}
                </h3>
                <p style="color: var(--gray-600); margin: 4px 0;">
                  <strong>Solicitante:</strong> ${primera.NombreSolicitante}
                </p>
                <p style="color: var(--gray-600); margin: 4px 0;">
                  <strong>Fecha:</strong> ${primera.FechaInicioExtra} | 
                  <strong>Horario:</strong> ${primera.HoraInicioExtra} - ${primera.HoraFinExtra}
                </p>
                <p style="color: var(--gray-600); margin: 4px 0;">
                  <strong>Motivo:</strong> ${primera.MotivoID} | 
                  <strong>Sector:</strong> ${primera.SectorExtraID}
                </p>
              </div>
              <span class="badge badge-${getStatusClass(primera.StatusSolicitud)}">
                ${primera.StatusSolicitud}
              </span>
            </div>
            
            <div class="table-container" style="margin: 16px 0;">
              <table class="table">
                <thead>
                  <tr>
                    <th>Colaborador</th>
                    <th>Legajo</th>
                    <th>IB</th>
                    <th>Horas</th>
                    <th>Valor</th>
                  </tr>
                </thead>
                <tbody>
                  ${sols.map(s => `
                    <tr>
                      <td>${s.NombreColaborador}</td>
                      <td>${s.Legajo}</td>
                      <td><span class="badge badge-ib-${s.IBSnapshot.toLowerCase()}">${s.IBSnapshot}</span></td>
                      <td>${parseFloat(s.CantidadHoras).toFixed(2)} hs</td>
                      <td>$${parseFloat(s.TotalGeneral).toFixed(2)}</td>
                    </tr>
                  `).join('')}
                </tbody>
                <tfoot>
                  <tr style="font-weight: 600; background: var(--gray-50);">
                    <td colspan="3">TOTAL</td>
                    <td>${totalHoras.toFixed(2)} hs</td>
                    <td>$${totalValor.toFixed(2)}</td>
                  </tr>
                </tfoot>
              </table>
            </div>
            
            ${primera.StatusSolicitud === 'PENDIENTE_APROBACION' ? `
              <div style="display: flex; gap: 12px; margin-top: 16px;">
                <button class="btn btn-success" onclick="abrirModalAprobar(${num})">
                  ✅ Aprobar
                </button>
                <button class="btn btn-danger" onclick="abrirModalRechazar(${num})">
                  ❌ Rechazar
                </button>
              </div>
            ` : ''}
          </div>
        `;
      });
      
      container.innerHTML = html;
    }
    
    function getStatusClass(status) {
      if (status === 'APROBADA') return 'success';
      if (status === 'RECHAZADA') return 'danger';
      return 'warning';
    }
    
    function abrirModalAprobar(numeroSolicitud) {
      solicitudActual = numeroSolicitud;
      const solicitud = solicitudesData.find(s => s.NumeroSolicitud == numeroSolicitud);
      
      document.getElementById('detalle-solicitud').innerHTML = `
        <div class="alert alert-info">
          <strong>Solicitud N° ${numeroSolicitud}</strong><br>
          Esta acción aprobará todos los colaboradores de esta solicitud.
        </div>
      `;
      
      document.getElementById('modal-aprobar').style.display = 'flex';
    }
    
    async function confirmarAprobacion() {
      const observacion = document.getElementById('obs-aprobacion').value;
      
      const result = await API.aprobarSolicitud(solicitudActual, { observacion });
      
      if (result.ok) {
        alert('✅ Solicitud aprobada exitosamente');
        cerrarModal('modal-aprobar');
        loadPendientes();
      } else {
        alert('Error: ' + result.error);
      }
    }
    
    function abrirModalRechazar(numeroSolicitud) {
      solicitudActual = numeroSolicitud;
      document.getElementById('modal-rechazar').style.display = 'flex';
    }
    
    async function confirmarRechazo() {
      const motivo = document.getElementById('motivo-rechazo').value;
      
      if (!motivo.trim()) {
        alert('Debe ingresar un motivo de rechazo');
        return;
      }
      
      const result = await API.rechazarSolicitud(solicitudActual, motivo);
      
      if (result.ok) {
        alert('❌ Solicitud rechazada');
        cerrarModal('modal-rechazar');
        document.getElementById('motivo-rechazo').value = '';
        loadPendientes();
      } else {
        alert('Error: ' + result.error);
      }
    }
    
    function cerrarModal(modalId) {
      document.getElementById(modalId).style.display = 'none';
    }
    
    function aplicarFiltros() {
      loadPendientes();
    }
    
    // Menu toggle mobile
    document.getElementById('menu-toggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('active');
    });
    
    if (Auth.isLoggedIn()) {
      loadPendientes();
    } else {
      window.location.href = '../index.html';
    }
  </script>
</body>
</html>
