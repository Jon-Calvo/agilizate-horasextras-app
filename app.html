<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGILIZATE – Panel</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="app-page">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <svg viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg" class="logo-svg-sm">
        <defs>
          <linearGradient id="lg1s" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#7dd3fc"/>
            <stop offset="100%" style="stop-color:#1d4ed8"/>
          </linearGradient>
        </defs>
        <polygon points="60,5 80,55 70,55 60,28 50,55 40,55" fill="url(#lg1s)"/>
        <rect x="46" y="40" width="28" height="6" fill="url(#lg1s)" opacity="0.7"/>
        <ellipse cx="60" cy="38" rx="32" ry="12" fill="none" stroke="#38bdf8" stroke-width="2.5"
          stroke-dasharray="6 3" opacity="0.8" transform="rotate(-20,60,38)"/>
      </svg>
      <div>
        <span class="sidebar-brand">AGILIZATE</span>
        <span class="sidebar-version">v1.0</span>
      </div>
      <button class="sidebar-close" onclick="UI.toggleSidebar()">✕</button>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-user" id="sidebarUser"></div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="UI.toggleSidebar()"></div>

  <!-- MAIN -->
  <div class="app-layout" id="appLayout">
    <header class="app-header">
      <button class="menu-toggle" onclick="UI.toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="header-title" id="headerTitle">Dashboard</div>
      <div class="header-actions">
        <div class="notification-bell" onclick="UI.toggleNotifications()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </div>
        <div class="user-avatar-wrap" id="userAvatarWrap" onclick="UI.toggleUserMenu()">
          <div class="user-avatar" id="userAvatarInitials">?</div>
          <div class="user-menu hidden" id="userMenu">
            <a href="#" onclick="event.preventDefault();UI.showSection('profile')">Mi Perfil</a>
            <a href="#" onclick="event.preventDefault();Auth.logout()">Cerrar Sesión</a>
          </div>
        </div>
      </div>
    </header>

    <main class="app-content" id="appContent">
      <div id="loadingScreen" class="loading-screen">
        <div class="loading-spinner"></div>
        <p>Cargando sistema…</p>
      </div>
    </main>
  </div>

  <div id="modalsContainer"></div>
  <div class="toast-container" id="toastContainer"></div>

  <!-- ── SCRIPTS en orden de dependencia ── -->
  <script src="js/config.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/utils/permisos.js"></script>
  <script src="js/utils/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/modules/auth.js"></script>
  <script src="js/modules/solicitudes.js"></script>
  <script src="js/modules/aprobaciones.js"></script>
  <script src="js/modules/porteria.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/usuarios.js"></script>
  <script src="js/modules/nomina.js"></script>
  <script src="js/modules/logs.js"></script>
  <script src="js/modules/excel.js"></script>
  <script src="js/modules/reportes.js"></script>
  <script src="js/modules/configuracion.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
