<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGILIZATE – Gestión de Horas Extras</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body class="login-page">

  <div class="login-bg">
    <div class="stars"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <!-- SVG logo inline para no depender de archivo externo -->
        <svg viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
          <defs>
            <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#7dd3fc"/>
              <stop offset="100%" style="stop-color:#1d4ed8"/>
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <!-- Letter A -->
          <polygon points="60,5 80,55 70,55 60,28 50,55 40,55" fill="url(#lg1)" filter="url(#glow)"/>
          <rect x="46" y="40" width="28" height="6" fill="url(#lg1)" opacity="0.7"/>
          <!-- Orbit ring -->
          <ellipse cx="60" cy="38" rx="32" ry="12" fill="none" stroke="#38bdf8" stroke-width="2.5"
            stroke-dasharray="6 3" opacity="0.8" filter="url(#glow)"
            transform="rotate(-20,60,38)"/>
        </svg>
        <div class="logo-text">
          <span class="logo-name">AGILIZATE</span>
          <span class="logo-sub">Gestión de Horas Extras</span>
        </div>
      </div>

      <form id="loginForm" class="login-form" onsubmit="return false;">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" autocomplete="username"
            placeholder="nombre.usuario" required />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="pw-wrap">
            <input type="password" id="password" name="password" autocomplete="current-password"
              placeholder="••••••••" required />
            <button type="button" class="toggle-pw" onclick="UI.togglePassword()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="loginError" class="alert alert-error hidden"></div>
        <button type="submit" id="btnLogin" class="btn btn-primary btn-full" onclick="Auth.login()">
          <span class="btn-text">Ingresar</span>
          <span class="btn-loader hidden">
            <svg viewBox="0 0 24 24" class="spin"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="30 70"/></svg>
          </span>
        </button>
      </form>

      <p class="login-footer">Jonathan Calvo &copy; 2026 · AGILIZATE v1.0</p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils/permisos.js"></script>
  <script src="js/utils/api.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/modules/auth.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
