<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGILIZATE - Login</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1>AGILIZATE</h1>
        <p>Sistema de Gestión de Horas Extras</p>
      </div>
      <form id="login-form" class="login-form">
        <div class="form-group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Iniciar Sesión</button>
        <div id="login-error" class="error-message" style="display:none;"></div>
      </form>
      <div class="login-footer">
        <p>AGILIZATE v1.0 | Desarrollado por Jonathan Calvo</p>
      </div>
    </div>
  </div>
  
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const usuario = document.getElementById('usuario').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      
      const result = await API.login(usuario, password);
      
      if (result.ok) {
        localStorage.setItem(CONFIG.STORAGE_KEYS.TOKEN, result.token);
        localStorage.setItem(CONFIG.STORAGE_KEYS.USER, JSON.stringify(result.usuario));
        window.location.href = 'pages/dashboard.html';
      } else {
        errorEl.textContent = result.error || 'Error al iniciar sesión';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
